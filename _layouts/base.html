<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or site.name }} — {{ site.tagline }}</title>
  <meta name="description" content="{{ description or site.tagline }}" />
  <meta name="robots" content="{{ robots or 'index, follow' }}" />

  <meta property="og:title"       content="{{ title or site.name }}" />
  <meta property="og:description" content="{{ description or site.tagline }}" />
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="{{ site.name }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/png" href="/public/Sheety_Logo.png" />
  <link rel="stylesheet" href="/css/shared.css" />
  {% block head %}{% endblock %}
</head>
<body>

  {% include "nav.html" %}

  {{ content | safe }}

  {% include "footer.html" %}

  <script>
    // Hamburger menu
    const hamburger = document.getElementById('hamburger');
    const drawer    = document.getElementById('drawer');
    hamburger.addEventListener('click', () => {
      const open = hamburger.classList.toggle('open');
      drawer.classList.toggle('open', open);
      hamburger.setAttribute('aria-expanded', open);
      document.body.style.overflow = open ? 'hidden' : '';
    });

    // Scroll fade-up
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
  </script>

</body>
</html>
